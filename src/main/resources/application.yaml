server:
  port: 8091
spring:
  application:
    name: LS-SM
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/social?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 1
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null #JSON处理时忽略非空字段
  rabbitmq:
    host: 192.168.207.80
    port: 5672
    username: admin
    password: 123456
    listener:
      simple:
        #消费者数量
        concurrent-consumers: 3
        max-concurrent-consumers: 10
        #手动确认消息
        ack-mode: manual
  elasticsearch:
    uris: http://127.0.0.1:9200
    username: elastic
    password: 123456
    connection-timeout: 5s
    socket-timeout: 30s

mybatis-plus:
  type-aliases-package: com.lssm.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
logging:
  level:
    com.lssm: debug
tencent:
  cos:
    secret-id: FAKE_SECRET_ID_REPLACE_ME
    secret-key: FAKE_SECRET_KEY_REPLACE_ME
    region: ap-guangzhou
    bucket: social147-1378406446
    prefix: upload/
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: true
knife4j:
  enable: true
  setting:
    language: zh_cn
lssm:
  jwt:
    secret: FAKE_JWT_SECRET_REPLACE_IN_PRODUCTION
    expiration: 604800000  # 7天（毫秒）
  # Token 配置
  token:
    expire-time: 604800  # Token过期时间（秒），7天
    prefix: "user:token:"  # Redis key 前缀








